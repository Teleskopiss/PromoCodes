<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PromoRadar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --text-xs:clamp(0.7rem,0.65rem + 0.25vw,0.8rem);
  --text-sm:clamp(0.8rem,0.75rem + 0.3vw,0.9rem);
  --text-base:clamp(0.875rem,0.82rem + 0.25vw,1rem);
  --text-lg:clamp(1rem,0.9rem + 0.5vw,1.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;
  --space-4:1rem;--space-8:2rem;--space-16:4rem;
  --radius-md:.45rem;--radius-lg:.65rem;--radius-xl:.875rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(.16,1,.3,1);
  --font:'Inter',system-ui,sans-serif;
  --nav-h:calc(3.5rem + env(safe-area-inset-bottom));
  --bg:#0f0f10;--surface:#1a1a1c;--surface-2:#222225;--surface-3:#2a2a2e;
  --border:rgba(255,255,255,.08);--divider:rgba(255,255,255,.05);
  --text:#e8e8ea;--text-muted:#8a8a90;--text-faint:#52525a;
  --primary:#6c8cff;--primary-dim:rgba(108,140,255,.14);
  --success:#4ade80;--success-dim:rgba(74,222,128,.12);
  --warn:#facc15;--warn-dim:rgba(250,204,21,.15);
  --pending:#f97316;--pending-dim:rgba(249,115,22,.13);
  --error:#f87171;--error-dim:rgba(248,113,113,.13);
  --shadow:0 3px 12px rgba(0,0,0,.4);
  --dim-bg:#141416;--dim-surface:#161618;--dim-border:rgba(255,255,255,.04);
  --dim-code:#6b6b72;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:none;}
body{font-family:var(--font);font-size:var(--text-base);color:var(--text);background:var(--bg);min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;}
.app{display:flex;flex-direction:column;min-height:100dvh;padding-bottom:var(--nav-h);}
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:var(--space-2) var(--space-3);
  padding-top:calc(var(--space-2) + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.topbar-logo{display:flex;align-items:center;gap:6px;font-size:var(--text-sm);font-weight:700;letter-spacing:-.02em;flex-shrink:0;}
.logo-icon{width:24px;height:24px;background:var(--primary);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.topbar-right{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0;}
#updatedText{font-size:var(--text-xs);color:var(--text-faint);white-space:nowrap;}
.refresh-btn{width:30px;height:30px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background var(--transition),color var(--transition);-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.refresh-btn:active{background:var(--surface-3);color:var(--text);}
.refresh-btn.spinning svg{animation:spin .7s linear infinite;}
.fetch-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:var(--radius-full);background:var(--warn-dim);border:1px solid var(--warn);color:var(--warn);font-size:var(--text-xs);font-weight:600;transition:all var(--transition);white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.fetch-btn:active{opacity:.75;transform:scale(.97);}
.fetch-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.fetch-btn svg{flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
/* FAB add button */
.fab{
  position:fixed;
  right:var(--space-4);
  bottom:calc(var(--nav-h) + var(--space-3));
  z-index:150;
  width:40px;height:40px;
  border-radius:var(--radius-full);
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:all var(--transition);
  -webkit-tap-highlight-color:transparent;
}
.fab:active{transform:scale(.93);background:var(--surface-3);}
/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:var(--space-4);padding-bottom:calc(var(--space-4) + env(safe-area-inset-bottom));width:100%;max-width:480px;transform:translateY(100%);transition:transform .25s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;gap:var(--space-3);}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal-title{font-size:var(--text-base);font-weight:700;}
.modal-row{display:flex;flex-direction:column;gap:6px;}
.modal-label{font-size:var(--text-xs);color:var(--text-muted);font-weight:500;}
.modal-input{background:var(--surface-3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-2) var(--space-3);font-size:var(--text-base);color:var(--text);font-family:'Courier New',monospace;font-weight:700;letter-spacing:.05em;width:100%;outline:none;}
.modal-input:focus{border-color:var(--primary);}
.modal-select{background:var(--surface-3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);color:var(--text);width:100%;outline:none;}
.modal-select:focus{border-color:var(--primary);}
/* Expiry pill row */
.expiry-pills{display:flex;gap:var(--space-2);flex-wrap:wrap;}
.expiry-pill{padding:4px 12px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;border:1px solid var(--border);background:var(--surface-3);color:var(--text-muted);cursor:pointer;transition:all var(--transition);-webkit-tap-highlight-color:transparent;}
.expiry-pill.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.modal-actions{display:flex;gap:var(--space-2);}
.modal-cancel{flex:1;padding:var(--space-2) var(--space-3);border-radius:var(--radius-lg);background:var(--surface-3);border:1px solid var(--border);color:var(--text-muted);font-size:var(--text-sm);font-weight:600;transition:all var(--transition);}
.modal-cancel:active{opacity:.75;}
.modal-save{flex:2;padding:var(--space-2) var(--space-3);border-radius:var(--radius-lg);background:var(--primary-dim);border:1px solid var(--primary);color:var(--primary);font-size:var(--text-sm);font-weight:700;transition:all var(--transition);}
.modal-save:active{opacity:.75;transform:scale(.98);}
.filter-bar{position:sticky;top:calc(40px + env(safe-area-inset-top));z-index:90;background:var(--bg);padding:var(--space-2) 0;border-bottom:1px solid var(--divider);}
.filter-scroll{display:flex;gap:var(--space-2);padding:0 var(--space-3);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.filter-scroll::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:3px var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all var(--transition);white-space:nowrap;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.chip.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.main{flex:1;padding:var(--space-3);display:flex;flex-direction:column;gap:var(--space-2);}
/* Normal card */
.card{background:var(--surface);border-radius:var(--radius-xl);border:1px solid var(--border);padding:var(--space-3);display:flex;flex-direction:column;gap:var(--space-2);box-shadow:var(--shadow);}
/* Dimmed card — expired AND used */
.card.dimmed{background:var(--dim-bg);border-color:var(--dim-border);box-shadow:none;}
.card.pending-card{border-color:var(--pending);background:var(--surface);}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);}
.game-badge{display:flex;align-items:center;gap:6px;font-size:var(--text-sm);font-weight:600;}
/* Game badge text — faded only when expired+used (card.dimmed) */
.card.dimmed .game-badge{color:var(--text-faint);}
/* Used-only: slightly faded */
.card.used-only .game-badge{color:#4a4a52;}
.game-dot{width:7px;height:7px;border-radius:var(--radius-full);flex-shrink:0;}
.card.dimmed .game-dot{opacity:.3;}
.card.used-only .game-dot{opacity:.45;}
.age-badge{font-size:var(--text-xs);color:var(--text-faint);flex-shrink:0;}
/* Normal code row */
.code-row{display:flex;align-items:center;gap:var(--space-2);background:var(--surface-3);border-radius:var(--radius-lg);padding:var(--space-2) var(--space-3);border:1px solid var(--border);cursor:pointer;transition:all var(--transition);-webkit-tap-highlight-color:transparent;}
.code-row:active{transform:scale(.97);}
.code-row.copied{background:var(--success-dim);border-color:var(--success);}
/* Dimmed code row (used or expired) */
.code-row.dimmed-row{background:var(--dim-surface);border-color:var(--dim-border);}
/* Expired has a faint red tint over the dim */
.code-row.expired-row{background:rgba(80,20,20,.35);border-color:rgba(248,113,113,.18);}
.code-text{flex:1;font-family:'Courier New',monospace;font-size:var(--text-lg);font-weight:700;letter-spacing:.06em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* Used (any state): strikethrough + dim text — mirrors expired+used look */
.code-row.dimmed-row .code-text{color:var(--dim-code);text-decoration:line-through;}
/* Expired-only (not used): reddish tint, no strikethrough */
.code-text.expired-text{color:#8a5050;}
/* Expired + used: inherit strikethrough from dimmed-row, darker red */
.code-row.expired-row.dimmed-row .code-text{color:#7a4a4a;}
.copy-icon{flex-shrink:0;width:32px;height:32px;border-radius:var(--radius-md);background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
.card.dimmed .copy-icon{background:rgba(255,255,255,.04);color:var(--dim-code);}
.copy-icon.expired-icon{background:rgba(248,113,113,.07);color:#8a5050;}
.code-row.dimmed-row .copy-icon{background:rgba(255,255,255,.04);color:var(--dim-code);}
.code-row.copied .copy-icon{background:var(--success-dim);color:var(--success);}
.pending-row{display:flex;align-items:center;gap:var(--space-2);background:var(--pending-dim);border-radius:var(--radius-lg);padding:var(--space-2) var(--space-3);border:1px solid var(--pending);}
.pending-text{flex:1;font-size:var(--text-base);font-weight:600;color:var(--pending);letter-spacing:.03em;}
.pending-label{font-size:var(--text-xs);color:var(--pending);opacity:.8;}
.collect-btn{flex-shrink:0;padding:5px 10px;border-radius:var(--radius-full);background:var(--pending-dim);border:1px solid var(--pending);color:var(--pending);font-size:var(--text-xs);font-weight:700;text-decoration:none;display:flex;align-items:center;gap:4px;transition:all var(--transition);-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.collect-btn:active{opacity:.75;}
.source-tag{font-size:var(--text-xs);padding:2px var(--space-2);border-radius:var(--radius-full);border:1px solid var(--border);color:var(--primary);background:var(--primary-dim);text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--space-16) var(--space-8);gap:var(--space-3);}
.empty-icon{font-size:2rem;opacity:.35;}
.empty h3{font-size:var(--text-base);font-weight:600;}
.empty p{font-size:var(--text-sm);color:var(--text-muted);max-width:26ch;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:var(--radius-md);}
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-3);display:flex;flex-direction:column;gap:var(--space-2);}
.skel-line{height:12px;}.skel-code{height:36px;border-radius:var(--radius-lg);}
.skel-tags{display:flex;gap:var(--space-2);}.skel-tag{height:20px;width:65px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-1) 0;gap:2px;font-size:var(--text-xs);color:var(--text-faint);transition:color var(--transition);-webkit-tap-highlight-color:transparent;cursor:pointer;min-height:52px;}
.nav-item.active{color:var(--primary);}
.nav-item svg{width:20px;height:20px;}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--space-3));left:50%;transform:translateX(-50%) translateY(6px);background:var(--text);color:var(--bg);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .18s,transform .18s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-logo">
      <div class="logo-icon">&#127920;</div>
      PromoRadar
    </div>
    <div class="topbar-right">
      <span id="updatedText">Loading...</span>
      <button class="refresh-btn" id="refreshBtn" title="Refresh data">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="fetch-btn" id="fetchBtn">
        <svg id="fetchIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span id="fetchLabel">Get New Info</span>
      </button>
    </div>
  </header>

  <div class="filter-bar">
    <div class="filter-scroll" id="filterScroll">
      <button class="chip active" data-filter="all">All games</button>
    </div>
  </div>

  <main class="main" id="main">
    <div class="skel-card" id="skel1"><div class="skel-line skeleton" style="width:40%"></div><div class="skel-code skeleton"></div><div class="skel-tags"><div class="skel-tag skeleton"></div></div></div>
    <div class="skel-card" id="skel2"><div class="skel-line skeleton" style="width:55%"></div><div class="skel-code skeleton"></div><div class="skel-tags"><div class="skel-tag skeleton"></div></div></div>
    <div class="skel-card" id="skel3"><div class="skel-line skeleton" style="width:35%"></div><div class="skel-code skeleton"></div><div class="skel-tags"><div class="skel-tag skeleton"></div></div></div>
  </main>
</div>

<!-- FAB add button -->
<button class="fab" id="addBtn" title="Add code manually" aria-label="Add code manually">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Add Code Modal -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-title">Add Code Manually</div>
    <div class="modal-row">
      <label class="modal-label" for="addCodeInput">Promo Code</label>
      <input class="modal-input" id="addCodeInput" type="text" placeholder="e.g. ra1n" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="modal-row">
      <label class="modal-label" for="addGameSelect">Game</label>
      <select class="modal-select" id="addGameSelect">
        <option value="gaminator">Gaminator</option>
        <option value="slotpark">Slotpark</option>
      </select>
    </div>
    <div class="modal-row">
      <label class="modal-label">Expires in</label>
      <div class="expiry-pills" id="expiryPills">
        <button class="expiry-pill" data-hours="12">12h</button>
        <button class="expiry-pill active" data-hours="24">24h</button>
        <button class="expiry-pill" data-hours="168">7 days</button>
        <button class="expiry-pill" data-hours="336">14 days</button>
        <button class="expiry-pill" data-hours="0">Never</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="addCancel">Cancel</button>
      <button class="modal-save" id="addSave">Add Code</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="navAll"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>All</button>
  <button class="nav-item" id="navNew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New</button>
  <button class="nav-item" id="navUsed"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Used</button>
</nav>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const DISPATCH_URL = 'https://promocodes-trigger.danielsmez1.workers.dev';
const CODES_URL    = './codes.json';
const COUNTDOWN    = 60;
const GAME_COLORS  = { gaminator:'#6c8cff', slotpark:'#fb923c' };
const GAME_NAMES   = { gaminator:'Gaminator', slotpark:'Slotpark' };
const USED_KEY     = 'promoRadar_used';
const MANUAL_KEY   = 'promoRadar_manual';
const DISPATCH_TIMEOUT_MS = 8000;

const EXPIRES_24H_SOURCES = new Set(['coinscrazy.com', 'gaminator.com']);
const SINGLE_CODE_SOURCES = new Set(['taplink.cc/gaminator','taplink.cc/slotpark','8bpreward.win']);
const HIDDEN_SOURCE_TAG   = new Set(['coinscrazy.com']);

const SOURCE_MAP = {
  'taplink.cc/gaminator':{ url:'https://taplink.cc/gaminator3000',                         label:'Gaminator TapLink' },
  'taplink.cc/slotpark': { url:'https://taplink.cc/slotpark',                              label:'Slotpark TapLink' },
  'gaminator.com':       { url:'https://gaminator.com/en/promotions',                      label:'Gaminator.com' },
  '8bpreward.win':       { url:'https://www.8bpreward.win/2025/11/gaminator-codes.html',   label:'8bpreward.win' },
};

function loadUsed(){ try{ return new Set(JSON.parse(localStorage.getItem(USED_KEY)||'[]')); }catch{ return new Set(); } }
function saveUsed(s){ try{ localStorage.setItem(USED_KEY, JSON.stringify([...s])); }catch{} }
function loadManual(){ try{ return JSON.parse(localStorage.getItem(MANUAL_KEY)||'[]'); }catch{ return []; } }
function saveManual(a){ try{ localStorage.setItem(MANUAL_KEY, JSON.stringify(a)); }catch{} }

let allCodes=[], usedSet=loadUsed(), activeGame='all', activeTab='all', lastUpdated=null;
let manualCodes = loadManual();

const mainEl       = document.getElementById('main');
const filterScroll = document.getElementById('filterScroll');
const toastEl      = document.getElementById('toast');
const updatedText  = document.getElementById('updatedText');
const refreshBtn   = document.getElementById('refreshBtn');
const fetchBtn     = document.getElementById('fetchBtn');
const fetchIcon    = document.getElementById('fetchIcon');
const fetchLabel   = document.getElementById('fetchLabel');
const addBtn       = document.getElementById('addBtn');
const addModal     = document.getElementById('addModal');
const addCancel    = document.getElementById('addCancel');
const addSave      = document.getElementById('addSave');
const addCodeInput = document.getElementById('addCodeInput');
const addGameSelect= document.getElementById('addGameSelect');
const expiryPills  = document.getElementById('expiryPills');

// ── Expiry pill selection ────────────────────────────────────────────────────
let selectedExpiryHours = 24; // default 24h
expiryPills.addEventListener('click', e => {
  const pill = e.target.closest('.expiry-pill');
  if (!pill) return;
  expiryPills.querySelectorAll('.expiry-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  selectedExpiryHours = parseInt(pill.dataset.hours, 10);
});

let toastTimer;
function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2800); }

function timeAgo(iso){
  if(!iso) return '\u2014';
  const diff=Date.now()-new Date(iso).getTime();
  if(diff<0) return 'just now';
  const m=Math.floor(diff/60000);
  if(m<1)  return 'just now';
  if(m<60) return `${m}min ago`;
  const h=Math.floor(m/60);
  if(h<24) return `${h}h ago`;
  const d=Math.floor(h/24);
  if(d<7)  return `${d}d ago`;
  const dt=new Date(iso);
  return `${dt.getDate()} ${dt.toLocaleString('en',{month:'short'})}`;
}

function isExpired(e){
  if(e.pending) return false;
  // Manual codes: check expiry_at if set
  if(e.manual){
    if(e.expiry_at) return Date.now() > new Date(e.expiry_at).getTime();
    return false; // no expiry = never expires
  }
  const src = e.source || '';
  if(EXPIRES_24H_SOURCES.has(src)){
    const age = Date.now() - new Date(e.found_at || e.date).getTime();
    return age > 24 * 3600 * 1000;
  }
  if(SINGLE_CODE_SOURCES.has(src)){
    return !!e.replaced;
  }
  return false;
}

function isNew(e){
  if(e.pending) return true;
  if(isExpired(e)) return false;
  if(usedSet.has(e.id)) return false;
  if(e.manual) return true;
  const src = e.source || '';
  if(SINGLE_CODE_SOURCES.has(src)) return !e.replaced;
  return (Date.now() - new Date(e.found_at || e.date+'T12:00:00Z').getTime()) < 48 * 3600 * 1000;
}

let updatedInterval=null;
function startUpdatedTicker(){
  clearInterval(updatedInterval);
  if(!lastUpdated){ updatedText.textContent=''; return; }
  function tick(){ updatedText.textContent='Updated '+timeAgo(lastUpdated); }
  tick();
  updatedInterval=setInterval(tick,30000);
}

function buildAllCodes(data){
  allCodes=[];
  ['gaminator','slotpark'].forEach(g=>{
    (data[g]||[]).forEach(entry=>{
      allCodes.push({
        id:          entry.code+'_'+g,
        game:        g,
        code:        entry.code,
        date:        entry.date,
        source:      entry.source||null,
        found_at:    entry.found_at||entry.date,
        pending:     entry.pending||false,
        collect_url: entry.collect_url||null,
        replaced:    entry.replaced||false,
        replaced_at: entry.replaced_at||null,
        manual:      false,
        expiry_at:   null,
      });
    });
  });
  manualCodes.forEach(m=>{
    allCodes.push({
      id:         m.id,
      game:       m.game,
      code:       m.code,
      date:       m.added_at,
      source:     null,
      found_at:   m.added_at,
      pending:    false,
      collect_url:null,
      replaced:   false,
      replaced_at:null,
      manual:     true,
      expiry_at:  m.expiry_at || null,
    });
  });
  allCodes.sort((a,b)=>{
    if(a.pending && !b.pending) return -1;
    if(!a.pending && b.pending) return 1;
    return new Date(b.found_at||b.date) - new Date(a.found_at||a.date);
  });
}

async function loadCodes(){
  refreshBtn.classList.add('spinning');
  try{
    const r=await fetch(CODES_URL+'?t='+Date.now());
    if(!r.ok) throw new Error(r.status);
    const data=await r.json();
    lastUpdated=data.updated_at||null;
    buildAllCodes(data);
  } catch(e){
    console.error('loadCodes:',e);
    if(!allCodes.length) showToast('Could not load codes');
  }
  refreshBtn.classList.remove('spinning');
  startUpdatedTicker();
  buildFilterChips();
  render();
}

refreshBtn.addEventListener('click',()=>{ loadCodes(); showToast('Refreshing...'); });

// ── Add code modal ──────────────────────────────────────────────────────────
addBtn.addEventListener('click',()=>{
  addCodeInput.value='';
  // Reset expiry pill to 24h default
  expiryPills.querySelectorAll('.expiry-pill').forEach(p => p.classList.remove('active'));
  expiryPills.querySelector('[data-hours="24"]').classList.add('active');
  selectedExpiryHours = 24;
  addModal.classList.add('open');
  setTimeout(()=>addCodeInput.focus(),300);
});
addCancel.addEventListener('click',()=>addModal.classList.remove('open'));
addModal.addEventListener('click',e=>{ if(e.target===addModal) addModal.classList.remove('open'); });

addSave.addEventListener('click',()=>{
  const code=addCodeInput.value.trim();
  if(!code){ showToast('Enter a code'); return; }
  const game=addGameSelect.value;
  const now = new Date();
  const expiry_at = selectedExpiryHours > 0
    ? new Date(now.getTime() + selectedExpiryHours * 3600 * 1000).toISOString()
    : null;
  const entry={ id:'manual_'+Date.now(), game, code, added_at:now.toISOString(), expiry_at };
  manualCodes.push(entry);
  saveManual(manualCodes);
  addModal.classList.remove('open');
  buildAllCodes({ gaminator: allCodes.filter(c=>c.game==='gaminator'&&!c.manual), slotpark: allCodes.filter(c=>c.game==='slotpark'&&!c.manual) });
  render();
  showToast('Code added!');
});

// ── Filter chips ────────────────────────────────────────────────────────────
function buildFilterChips(){
  const games=[...new Set(allCodes.map(c=>c.game))];
  filterScroll.innerHTML='';
  const allChip=document.createElement('button');
  allChip.className='chip'+(activeGame==='all'?' active':'');
  allChip.dataset.filter='all';
  allChip.textContent='All games';
  allChip.addEventListener('click',()=>{ activeGame='all'; buildFilterChips(); render(); });
  filterScroll.appendChild(allChip);
  games.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='chip'+(activeGame===g?' active':'');
    btn.dataset.filter=g;
    btn.textContent=GAME_NAMES[g]||g;
    btn.addEventListener('click',()=>{ activeGame=g; buildFilterChips(); render(); });
    filterScroll.appendChild(btn);
  });
}

// ── Render ──────────────────────────────────────────────────────────────────
function render(){
  ['skel1','skel2','skel3'].forEach(id=>{ const el=document.getElementById(id); if(el) el.remove(); });

  let visible=allCodes.filter(c=> activeGame==='all' || c.game===activeGame );
  if(activeTab==='new')  visible=visible.filter(c=>isNew(c));
  if(activeTab==='used') visible=visible.filter(c=>usedSet.has(c.id)&&!c.pending);

  mainEl.innerHTML='';
  if(!visible.length){
    mainEl.innerHTML=`<div class="empty"><div class="empty-icon">&#127922;</div><h3>${activeTab==='used'?'No used codes yet':activeTab==='new'?'No new codes':'No codes yet'}</h3><p>${activeTab==='used'?'Codes you copy will appear here':'Check back soon for new promo codes'}</p></div>`;
    return;
  }

  visible.forEach(entry=>{
    const expired   = isExpired(entry);
    const used      = usedSet.has(entry.id);
    // Dimmed only if BOTH expired AND used
    const bothDim   = expired && used;
    // Used-only state (used but not expired)
    const usedOnly  = used && !expired;

    const card=document.createElement('div');
    card.className='card'+(entry.pending?' pending-card':'')+(bothDim?' dimmed':usedOnly?' used-only':'');

    const color = GAME_COLORS[entry.game]||'#6c8cff';
    const dotStyle = bothDim ? 'background:#2a2a2e' : usedOnly ? `background:${color};opacity:.45` : `background:${color}`;

    const header=document.createElement('div');
    header.className='card-header';
    header.innerHTML=`
      <div class="game-badge">
        <span class="game-dot" style="${dotStyle}"></span>
        ${GAME_NAMES[entry.game]||entry.game}
      </div>
      <span class="age-badge">${timeAgo(entry.found_at||entry.date)}</span>`;
    card.appendChild(header);

    if(entry.pending){
      const row=document.createElement('div');
      row.className='pending-row';
      row.innerHTML=`
        <div><div class="pending-text">Pending code</div><div class="pending-label">${entry.date||''}</div></div>
        ${entry.collect_url?`<a class="collect-btn" href="${entry.collect_url}" target="_blank" rel="noopener"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Collect</a>`:'<span class="pending-label">Soon</span>'}
      `;
      card.appendChild(row);
    } else {
      // A code row is "dimmed-row" if used (regardless of expiry) OR if expired
      const isDimRow = used || expired;
      const rowClass = 'code-row'+(isDimRow?' dimmed-row':'')+(expired?' expired-row':'');
      // expired-text only on expired codes that are NOT used (used already gets line-through via dimmed-row)
      const codeClass= 'code-text'+(expired && !used?' expired-text':'');
      const iconClass= 'copy-icon'+(expired && !used?' expired-icon':'');
      const row=document.createElement('div');
      row.className=rowClass;
      row.dataset.id=entry.id;
      row.innerHTML=`
        <span class="${codeClass}">${entry.code}</span>
        <span class="${iconClass}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </span>`;
      row.addEventListener('click',()=>{
        navigator.clipboard.writeText(entry.code).catch(()=>{});
        usedSet.add(entry.id); saveUsed(usedSet);
        row.classList.add('copied');
        setTimeout(()=>row.classList.remove('copied'),1200);
        showToast('Copied: '+entry.code);
        render();
      });
      card.appendChild(row);
    }

    const src=entry.source;
    if(src && !HIDDEN_SOURCE_TAG.has(src) && SOURCE_MAP[src]){
      const sm=SOURCE_MAP[src];
      const tag=document.createElement('div');
      tag.innerHTML=`<a class="source-tag" href="${sm.url}" target="_blank" rel="noopener"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${sm.label}</a>`;
      card.appendChild(tag);
    }

    mainEl.appendChild(card);
  });
}

// ── Bottom nav ──────────────────────────────────────────────────────────────
function setTab(t){
  activeTab=t;
  ['navAll','navNew','navUsed'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const map={all:'navAll',new:'navNew',used:'navUsed'};
  document.getElementById(map[t]).classList.add('active');
  render();
}
document.getElementById('navAll').addEventListener('click',()=>setTab('all'));
document.getElementById('navNew').addEventListener('click',()=>setTab('new'));
document.getElementById('navUsed').addEventListener('click',()=>setTab('used'));

// ── Fetch / dispatch ────────────────────────────────────────────────────────
function resetFetchBtn(){
  fetchBtn.disabled=false;
  fetchLabel.textContent='Get New Info';
  fetchIcon.innerHTML='<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>';
}

let countdown=0, countTimer=null;
function startCountdown(){
  fetchBtn.disabled=true;
  countdown=COUNTDOWN;
  function tick(){
    fetchLabel.textContent=`Wait ${countdown}s`;
    countdown--;
    if(countdown<0){
      clearInterval(countTimer);
      resetFetchBtn();
    }
  }
  tick();
  countTimer=setInterval(tick,1000);
}

fetchBtn.addEventListener('click',async()=>{
  if(fetchBtn.disabled) return;
  fetchLabel.textContent='Triggering...';
  fetchBtn.disabled=true;

  // Abort controller so the request never hangs forever
  const controller = new AbortController();
  const timeoutId  = setTimeout(()=>controller.abort(), DISPATCH_TIMEOUT_MS);

  try{
    const r = await fetch(DISPATCH_URL, { method:'POST', signal: controller.signal });
    clearTimeout(timeoutId);
    if(r.ok){
      showToast('Scraping started! Check back in ~30s');
      startCountdown();
      setTimeout(()=>loadCodes(), 32000);
    } else {
      showToast('Trigger failed ('+r.status+')');
      resetFetchBtn();
    }
  } catch(e){
    clearTimeout(timeoutId);
    if(e.name === 'AbortError'){
      showToast('Request timed out — try again');
    } else {
      showToast('Network error');
    }
    resetFetchBtn();
  }
});

loadCodes();
</script>
